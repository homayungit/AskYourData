version: "3.9"

services:

  # ─── Qdrant Vector Store ────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: erp_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── ASP.NET Core 10 API ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/ErpRagChatbot.API/Dockerfile
    container_name: erp_api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - OllamaSettings__BaseUrl=http://host.docker.internal:11434
      - QdrantSettings__Host=qdrant
      - QdrantSettings__Port=6334
    extra_hosts:
      - "host.docker.internal:host-gateway"   # on-prem Linux: reach Ollama on host
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/chatbot/status"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Vue 3 Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: src/frontend
      dockerfile: Dockerfile
    container_name: erp_frontend
    restart: unless-stopped
    ports:
      - "4500:80"
    depends_on:
      - api

volumes:
  qdrant_data:
